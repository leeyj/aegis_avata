<div class="panel-label" data-i18n="panels.p-youtube">YOUTUBE MUSIC</div>
<div class="yt-content">
    <div id="yt-player-core"></div>
    <div class="yt-info">
        <img id="yt-thumbnail" src="" class="yt-thumb" style="display: none;">
        <div class="yt-text">
            <div id="yt-track-title" class="truncate" data-i18n="widgets.yt_wait">Wait for Load...</div>
            <div id="yt-track-artist" class="truncate yt-artist" data-i18n="widgets.yt_select">Select Playlist</div>
        </div>
    </div>
    <div class="yt-controls">
        <select id="yt-mode-select" class="yt-select"></select>
        <div class="yt-btns no-drag">
            <button id="yt-play-btn" class="yt-btn no-drag">▶</button>
            <button id="yt-pause-btn" class="yt-btn no-drag">⏸</button>
            <button id="yt-next-btn" class="yt-btn no-drag">⏭</button>
            <input type="range" id="yt-volume" class="yt-vol-slider no-drag" min="0" max="100" value="30">
        </div>
    </div>
</div>
