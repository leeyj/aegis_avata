<div id="terminal-plugin-wrapper" class="terminal-plugin-wrapper">
    <div id="terminal-container" class="terminal-container">
        <div id="terminal-log" class="terminal-log"></div>
        
        <div class="terminal-prompt-area">
            <div class="terminal-prompt-row">
                <div class="model-badge">
                    <select id="ai-model-selector" class="terminal-select">
                        <option value="gemini">AEGIS CORE</option>
                    </select>
                </div>
                <span class="prompt-cursor">>></span>
                <input type="text" id="terminal-input" placeholder="시스템 명령어 또는 AI 쿼리를 입력하세요..." autocomplete="off">
            </div>
            
            <div class="terminal-status-bar">
                <div class="status-left">
                    <span class="status-indicator"></span>
                    <span class="status-node">READY</span>
                </div>
                <div class="status-right">
                    <span class="status-info">SIGNAL STRENGTH: OPTIMAL</span>
                    <span class="status-version">v4.1.0-STABLE</span>
                </div>
            </div>
        </div>
    </div>
</div>
